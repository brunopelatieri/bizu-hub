# Stack Portainer — Bizu Hub (Nginx Proxy Manager)
#
# Use esta variante se o reverse proxy for Nginx Proxy Manager em vez de Traefik.
# No NPM: Proxy Host → brunogoulart.com.br → http://app:3000 (rede Docker `bizu-hub`)
#
# A stack NÃO publica porta no host — apenas rede interna + proxy externo opcional.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bizu-hub
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    image: ${DOCKER_IMAGE}:${DOCKER_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    networks:
      - bizu-hub

networks:
  bizu-hub:
    driver: bridge

volumes:
  postgres_data:
