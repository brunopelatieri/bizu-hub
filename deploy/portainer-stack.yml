version: "3.8"

## Bizu Hub Bruno Goulart — brunogoulart.com.br
## VPS: 212.85.19.156 | Rede Traefik: bru | Registry: GitLab
##
## Portainer → Stacks → Web editor
## Variáveis: deploy/.env.portainer.example
## DNS: A @ e www → 212.85.19.156

services:

  postgres:
    image: postgres:16-alpine
    volumes:
      - bizu_hub_postgres_data:/var/lib/postgresql/data
    networks:
      - bru
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  app:
    image: ${DOCKER_IMAGE}:${DOCKER_TAG:-latest}
    networks:
      - bru
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@bizu-hub_postgres:5432/${POSTGRES_DB}
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.docker.network=bru
        ## Site principal
        - traefik.http.routers.bizu-hub.rule=Host(`brunogoulart.com.br`)
        - traefik.http.routers.bizu-hub.entrypoints=websecure
        - traefik.http.routers.bizu-hub.tls=true
        - traefik.http.routers.bizu-hub.tls.certresolver=letsencryptresolver
        - traefik.http.routers.bizu-hub.service=bizu-hub-svc
        - traefik.http.services.bizu-hub-svc.loadbalancer.server.port=3000
        - traefik.http.services.bizu-hub-svc.loadbalancer.passHostHeader=true
        ## www → apex
        - traefik.http.routers.bizu-hub-www.rule=Host(`www.brunogoulart.com.br`)
        - traefik.http.routers.bizu-hub-www.entrypoints=websecure
        - traefik.http.routers.bizu-hub-www.tls=true
        - traefik.http.routers.bizu-hub-www.tls.certresolver=letsencryptresolver
        - traefik.http.routers.bizu-hub-www.middlewares=bizu-hub-www-redirect
        - traefik.http.middlewares.bizu-hub-www-redirect.redirectregex.regex=^https://www\.brunogoulart\.com\.br(.*)
        - traefik.http.middlewares.bizu-hub-www-redirect.redirectregex.replacement=https://brunogoulart.com.br$${1}
        - traefik.http.middlewares.bizu-hub-www-redirect.redirectregex.permanent=true

volumes:
  bizu_hub_postgres_data:
    name: bizu_hub_postgres_data

networks:
  bru:
    external: true
    name: bru
