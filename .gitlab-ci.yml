# Bizu Hub Bruno Goulart — build e push para GitLab Container Registry
# https://gitlab.com/brunopelatieri/bizu-hub
#
# Variáveis CI/CD (Settings → CI/CD → Variables):
#   VITE_SUPABASE_URL              — obrigatória (build)
#   VITE_SUPABASE_PUBLISHABLE_KEY  — obrigatória (build)
#
# Imagem gerada: registry.gitlab.com/brunopelatieri/bizu-hub:latest

stages:
  - build

variables:
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_DRIVER: overlay2

build-image:
  stage: build
  image: docker:27-cli
  services:
    - docker:27-dind
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_JOB_TOKEN" "$CI_REGISTRY"
  script:
    - |
      docker build \
        --build-arg "VITE_SUPABASE_URL=${VITE_SUPABASE_URL}" \
        --build-arg "VITE_SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY}" \
        -t "${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA}" \
        -t "${CI_REGISTRY_IMAGE}:latest" \
        .
    - docker push "${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA}"
    - docker push "${CI_REGISTRY_IMAGE}:latest"
    - |
      if [ -n "${CI_COMMIT_TAG}" ]; then
        docker tag "${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA}" "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
        docker push "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
      fi
